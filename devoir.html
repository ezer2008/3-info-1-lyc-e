<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مواعيد الفروض</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    margin: 0;
    color: white;
    background: url("https://images.unsplash.com/photo-1509062522246-3755977927d7") no-repeat center center/cover;
}

.overlay {
    background: rgba(0,0,0,0.7);
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: rgba(0,0,0,0.6);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px #00ffd5;
}

h1 {
    text-align: center;
    color: #00ffd5;
}

.subject {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}

.btn {
    background: linear-gradient(45deg, #ff4b5c, #ff9a00);
    border: none;
    padding: 10px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

.btn:hover {
    transform: scale(1.1);
}

#dateDisplay {
    margin-top: 20px;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="overlay">
<div class="container">

<h1>📚 مواعيد الفروض</h1>

<!-- المواد -->
<div class="subject"><span>الرياضيات</span><button class="btn" onclick="showDate('الرياضيات')">عرض</button></div>
<div class="subject"><span>الفيزياء</span><button class="btn" onclick="showDate('الفيزياء')">عرض</button></div>
<div class="subject"><span>اللغة العربية</span><button class="btn" onclick="showDate('اللغة العربية')">عرض</button></div>
<div class="subject"><span>اللغة الفرنسية</span><button class="btn" onclick="showDate('اللغة الفرنسية')">عرض</button></div>
<div class="subject"><span>اللغة الإنجليزية</span><button class="btn" onclick="showDate('اللغة الإنجليزية')">عرض</button></div>
<div class="subject"><span>تاريخ</span><button class="btn" onclick="showDate('تاريخ')">عرض</button></div>
<div class="subject"><span>الجغرافيا</span><button class="btn" onclick="showDate('الجغرافيا')">عرض</button></div>
<div class="subject"><span>الخوارزميات و البرمجة(théorique)</span><button class="btn" onclick="showDate('algoT')">عرض</button></div>
<div class="subject"><span>العلوم و التقنيات الإعلامية(théorique)</span><button class="btn" onclick="showDate('infoT')">عرض</button></div>
<div class="subject"><span>الخوارزميات و البرمجة(pratique)</span><button class="btn" onclick="showDate('algoP')">عرض</button></div>
<div class="subject"><span>العلوم و التقنيات الإعلامية(pratique)</span><button class="btn" onclick="showDate('info Pratique')">عرض</button></div>
<div id="dateDisplay"></div>

</div>
</div>

<script>
function showDate(subject) {
    let dateDisplay = document.getElementById("dateDisplay");

    let dates = {

        "الرياضيات": { day:"الثلاثاء", date:5, month:5, year:2026, time:"08:00", room:"قاعة 26" },
        "الفيزياء":{day:"الإربعاء", date:29, month:4, year:2026, time:"14:00", room:"lph1"},
        "اللغة العربية": {day:"الخميس", date:23, month:4, year:2026, time:"10:00", room:"قاعة 30"},
        "اللغة الفرنسية": { day:"الإثنين", date:27, month:4, year:2026, time:"14:00", room:"قاعة 20" },
        "اللغة الإنجليزية":{day:"الخميس", date:30, month:4, year:2026, time:"08:00", room:"قاعة 10"},
        "الجغرافيا": { day:"الجمعة", date:24, month:4, year:2026, time:"08:00", room:"قاعة 27" },

        /* مواد فارغة */
        "تاريخ": {day:"الثلاثاء", date:7, month:4, year:2026, time:"15:00", room:"قاعة 7"},
        "algoT": {day:"الإربعاء", date:15, month:4, year:2026, time:"08:00", room:"labo 5"},
        "infoT": {day:"الإثنين", date:20, month:4, year:2026, time:"10:00", room:"labo 1"},
        "algoP": {day:"الاثنين", date:27, month:4, year:2026, time:"08:00", room:"labo 5"},
        "info Pratique": {day:"الإربعاء", date:8, month:4, year:2026, time:"08:00", room:"labo 2"},
        
    };

    let schedule = dates[subject];

    // إذا فارغ
    if (!schedule || Object.keys(schedule).length === 0) {
        dateDisplay.innerHTML = "ℹ️ لا توجد معلومات حول الفرض";
        return;
    }

    let examDate = new Date(schedule.year, schedule.month - 1, schedule.date);
    let [h, m] = schedule.time.split(":");
    examDate.setHours(h, m);

    let now = new Date();

    if (now > examDate) {
        dateDisplay.innerHTML = `❌ لقد انتهى فرض ${subject}`;
        return;
    }

    dateDisplay.innerHTML = `
    📅 ${schedule.day} ${schedule.date}/${schedule.month}/${schedule.year}<br>
    ⏰ ${schedule.time}<br>
    📍 ${schedule.room}
    `;
}
</script>

</body>
</html>
