<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;
    background: url("https://images.unsplash.com/photo-1588072432836-e10032774350") no-repeat center center/cover;
}

.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

h1 {
    font-size: 35px;
    color: #00ffd5;
}

/* الأزرار */
a {
    display: block;
    width: 230px;
    margin: 12px auto;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 16px;
    position: relative;
    transition: 0.3s;
}

a:hover {
    transform: scale(1.1);
}

/* ألوان */
.btn1 { background: #ff4b5c; color:white }
.btn2 { background: #00c9a7; color:white }
.btn3 { background: #ffc75f; color:black; }
.btn4 { background: aqua; color:black; }
 #zar{color:Yellow;}

/* 🔥 NEW LED */
.badge {
    position: absolute;
    top: -10px;
    right: -10px;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    animation: ledBlink 1s infinite alternate;
}

@keyframes ledBlink {
    0% {
        background: red;
        color: white;
        box-shadow: 0 0 10px red;
    }
    100% {
        background: white;
        color: red;
        box-shadow: 0 0 10px white;
    }
}

/* 💬 bubble */
.bubble {
    margin-top: 80px;
    display: inline-block;
    background: white;
    color: black;
    padding: 12px 18px;
    border-radius: 40px;
    font-size: 14px;
    position: relative;
    box-shadow: 0 0 15px white;
    animation: float 2s infinite;
}

/* 🔻 سهم يشير للعطل */
.bubble::after {
    content: "";
    position: absolute;
    top: -60px;
    right: 50%;
    transform: translateX(50%);
    border: 15px solid transparent;
    border-bottom-color: white;
}

/* حركة */
@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
    100% { transform: translateY(0); }
}

/* footer */
.footer {
    margin-top: 20px;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    background: linear-gradient(45deg, #ff4b5c, #00ffd5, #ffc75f);
    background-size: 300% 300%;
    color: black;
    animation: gradientMove 5s infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">
